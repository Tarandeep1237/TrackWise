<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackWise - Income</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar glass-panel" style="border-radius: 0; border-left: none; border-top: none; border-bottom: none;">
            <div class="sidebar-header">
                <h2>TrackWise</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item">Dashboard</a>
                <a href="expenses.html" class="nav-item">Expenses</a>
                <a href="income.html" class="nav-item active">Income</a>
                <a href="analytics.html" class="nav-item">Analytics</a>
                <a href="profile.html" class="nav-item">Profile</a>
            </nav>
            <div style="padding: 24px;">
                <button id="logoutBtn" class="btn btn-danger" style="width: 100%;">Log Out</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1>Manage Income</h1>
            </div>
            
            <div id="alertBox"></div>

            <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 24px;">
                <div class="glass-panel" style="height: fit-content;">
                    <h3>Record Income</h3>
                    <form id="incomeForm" style="margin-top: 20px; display: flex; flex-direction: column; gap: 15px;">
                        <input type="hidden" id="incomeId">
                        
                        <div class="input-group">
                            <label>Amount (USD)</label>
                            <input type="number" step="0.01" id="amount" required placeholder="0.00">
                        </div>
                        
                        <div class="input-group">
                            <label>Income Source</label>
                            <input type="text" id="source" required placeholder="Salary, Freelance, etc.">
                        </div>

                        <div class="input-group">
                            <label>Date Received</label>
                            <input type="date" id="date" required>
                        </div>

                        <button type="submit" class="btn btn-primary" id="submitBtn">Add Income</button>
                        <button type="button" class="btn btn-danger" id="cancelBtn" style="display: none;">Cancel Edit</button>
                    </form>
                </div>

                <div class="glass-panel">
                    <h3>Income History</h3>
                    <div style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Source</th>
                                    <th>Amount</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="incomeList">
                                <tr><td colspan="4" style="text-align: center;">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="js/income.js"></script>
</body>
</html>
