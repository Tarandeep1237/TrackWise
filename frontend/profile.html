<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackWise - Profile</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar glass-panel" style="border-radius: 0; border-left: none; border-top: none; border-bottom: none;">
            <div class="sidebar-header">
                <h2>TrackWise</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item">Dashboard</a>
                <a href="expenses.html" class="nav-item">Expenses</a>
                <a href="income.html" class="nav-item">Income</a>
                <a href="analytics.html" class="nav-item">Analytics</a>
                <a href="profile.html" class="nav-item active">Profile</a>
            </nav>
            <div style="padding: 24px;">
                <button id="logoutBtn" class="btn btn-danger" style="width: 100%;">Log Out</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1>User Profile</h1>
            </div>
            
            <div id="alertBox"></div>

            <div style="display: grid; grid-template-columns: 1fr; max-width: 600px; gap: 24px;">
                <div class="glass-panel">
                    <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid var(--border);">
                        <div style="width: 80px; height: 80px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 2rem; color: white; font-weight: bold;" id="profileInitials">
                            -
                        </div>
                        <div>
                            <h2 id="profileName">Loading Name...</h2>
                            <p id="profileEmail" style="color: var(--text-muted);">Loading Email...</p>
                        </div>
                    </div>

                    <h3>Account Details</h3>
                    <div style="margin-top: 16px; display: flex; flex-direction: column; gap: 15px;">
                        <div style="display: flex; justify-content: space-between; padding: 12px; background: rgba(255,255,255,0.02); border-radius: 8px;">
                            <span style="color: var(--text-muted);">Account ID</span>
                            <span id="profileId" style="font-weight: 500;">-</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; padding: 12px; background: rgba(255,255,255,0.02); border-radius: 8px;">
                            <span style="color: var(--text-muted);">Member Since</span>
                            <span id="profileDate" style="font-weight: 500;">-</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="js/profile.js"></script>
</body>
</html>
