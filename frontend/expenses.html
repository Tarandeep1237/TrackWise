<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackWise - Expenses</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar glass-panel" style="border-radius: 0; border-left: none; border-top: none; border-bottom: none;">
            <div class="sidebar-header">
                <h2>TrackWise</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item">Dashboard</a>
                <a href="expenses.html" class="nav-item active">Expenses</a>
                <a href="income.html" class="nav-item">Income</a>
                <a href="analytics.html" class="nav-item">Analytics</a>
                <a href="profile.html" class="nav-item">Profile</a>
            </nav>
            <div style="padding: 24px;">
                <button id="logoutBtn" class="btn btn-danger" style="width: 100%;">Log Out</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1>Manage Expenses</h1>
            </div>
            
            <div id="alertBox"></div>

            <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 24px;">
                <div class="glass-panel" style="height: fit-content;">
                    <h3>Add New Expense</h3>
                    <form id="expenseForm" style="margin-top: 20px; display: flex; flex-direction: column; gap: 15px;">
                        <input type="hidden" id="expenseId">
                        
                        <div class="input-group">
                            <label>Amount (USD)</label>
                            <input type="number" step="0.01" id="amount" required placeholder="0.00">
                        </div>
                        
                        <div class="input-group">
                            <label>Category</label>
                            <select id="category" required>
                                <option value="Food">Food</option>
                                <option value="Travel">Travel</option>
                                <option value="Bills">Bills</option>
                                <option value="Shopping">Shopping</option>
                                <option value="Others">Others</option>
                            </select>
                        </div>

                        <div class="input-group">
                            <label>Date</label>
                            <input type="date" id="date" required>
                        </div>
                        
                        <div class="input-group">
                            <label>Description</label>
                            <input type="text" id="description" placeholder="Optional notes">
                        </div>

                        <button type="submit" class="btn btn-primary" id="submitBtn">Add Expense</button>
                        <button type="button" class="btn btn-danger" id="cancelBtn" style="display: none;">Cancel Edit</button>
                    </form>
                </div>

                <div class="glass-panel">
                    <h3>Expense History</h3>
                    <div style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Category</th>
                                    <th>Description</th>
                                    <th>Amount</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="expensesList">
                                <tr><td colspan="5" style="text-align: center;">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="js/expenses.js"></script>
</body>
</html>
