<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackWise - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="glass-panel auth-form">
            <h2>Welcome Back</h2>
            <div id="alertBox"></div>
            
            <form id="loginForm">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required placeholder="name@example.com">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                
                <button type="submit" class="btn btn-primary" style="margin-top: 10px;">Sign In</button>
            </form>
            
            <p style="text-align: center; color: var(--text-muted); font-size: 0.9rem;">
                Don't have an account? <a href="register.html" style="color: var(--accent);">Create one</a>
            </p>
        </div>
    </div>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
