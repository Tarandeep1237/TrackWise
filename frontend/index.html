<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackWise - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar glass-panel" style="border-radius: 0; border-left: none; border-top: none; border-bottom: none;">
            <div class="sidebar-header">
                <h2>TrackWise</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item active">Dashboard</a>
                <a href="expenses.html" class="nav-item">Expenses</a>
                <a href="income.html" class="nav-item">Income</a>
                <a href="analytics.html" class="nav-item">Analytics</a>
                <a href="profile.html" class="nav-item">Profile</a>
            </nav>
            <div style="padding: 24px;">
                <button id="logoutBtn" class="btn btn-danger" style="width: 100%;">Log Out</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1>Overview</h1>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <span id="userNameDisplay" style="color: var(--text-muted);">Welcome</span>
                </div>
            </div>

            <div class="summary-grid">
                <div class="glass-panel summary-card">
                    <h3>Total Income</h3>
                    <div class="amount positive" id="incomeTotal">$0.00</div>
                </div>
                <div class="glass-panel summary-card">
                    <h3>Total Expenses</h3>
                    <div class="amount negative" id="expenseTotal">$0.00</div>
                </div>
                <div class="glass-panel summary-card">
                    <h3>Net Balance</h3>
                    <div class="amount neutral" id="balanceTotal">$0.00</div>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 24px;">
                <div class="glass-panel">
                    <h3>Recent Transactions</h3>
                    <table style="margin-top: 16px;">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Type</th>
                                <th>Category/Source</th>
                                <th>Amount</th>
                            </tr>
                        </thead>
                        <tbody id="recentTransactions">
                            <tr><td colspan="4" style="text-align: center;">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
                
                <div class="glass-panel">
                    <h3>Quick Overview</h3>
                    <canvas id="balanceChart" style="margin-top: 20px;"></canvas>
                </div>
            </div>
        </main>
    </div>

    <!-- Chart.js via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="js/dashboard.js"></script>
</body>
</html>
