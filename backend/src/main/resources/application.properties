spring.application.name=backend
server.port=5000

spring.datasource.url=jdbc:mysql://localhost:3306/trackwise_db
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Keep the DB schema as is, don't update from hibernate because it's already created
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# JWT Secret from old .env (if it's long enough, else we might need a longer one)
jwt.secret=super_secret_trackwise_jwt_key_that_is_long_enough_for_hs256
jwt.expiration=86400000
